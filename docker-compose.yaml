services:
  app:
    build: .
    env_file:
      - scout/.env
    depends_on:
      jobspy-mcp:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      JOBSPY_MCP_URL: http://jobspy-mcp:9423
      DATABASE_URL: postgresql://scout:scout@postgres:5432/scout
    volumes:
      - ./reports:/app/reports
      - ./scout/profile.json:/app/scout/profile.json:ro

  # Kept running (not one-shot) so jobspy-mcp can `docker exec` into it per
  # search instead of paying `docker run` container-startup cost every time.
  jobspy-scraper:
    build:
      context: ./vendor/jobspy-mcp-server/jobspy
    image: jobspy
    container_name: jobspy-scraper
    entrypoint: ["tail", "-f", "/dev/null"]
    restart: unless-stopped

  # jobspy-mcp-server doesn't ship a self-contained Docker image: at runtime it
  # shells out to `docker exec jobspy-scraper ...` to run a search in the
  # long-lived scraper container above. So this container gets the host's
  # Docker socket mounted in, rather than its own nested Docker daemon.
  jobspy-mcp:
    build:
      context: .
      dockerfile_inline: |
        FROM node:20-alpine
        RUN apk add --no-cache docker-cli
        WORKDIR /app
        COPY vendor/jobspy-mcp-server/package.json vendor/jobspy-mcp-server/package-lock.json ./
        RUN npm ci --omit=dev
        COPY vendor/jobspy-mcp-server .
        # Our overrides fix two upstream issues instead of patching the
        # tracked submodule with sed:
        #  - index.js/sseManager.js: upstream shares one MCP `Server`
        #    instance across all SSE connections and crashes on a second
        #    concurrent connection, so our version creates one per
        #    connection (also drops upstream's prompt registrations, which
        #    pass z.object(...) where the SDK expects a raw Zod shape and
        #    crash the server before it can bind its port).
        #  - tools/search-jobs.js: execs into the long-lived jobspy-scraper
        #    container instead of `docker run --rm` per search.
        COPY docker/jobspy-mcp/index.js src/index.js
        COPY docker/jobspy-mcp/sseManager.js src/sseManager.js
        COPY docker/jobspy-mcp/search-jobs.js src/tools/search-jobs.js
        EXPOSE 9423
        CMD ["node", "src/index.js"]
    environment:
      ENABLE_SSE: "1"
      JOBSPY_PORT: "9423"
      JOBSPY_HOST: "0.0.0.0"
      JOBSPY_CONTAINER_NAME: "jobspy-scraper"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - jobspy-scraper
    ports:
      - "9423:9423"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9423/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: scout
      POSTGRES_PASSWORD: scout
      POSTGRES_DB: scout
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scout"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"

volumes:
  postgres-data:
