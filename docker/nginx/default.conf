# Serves the scout dashboard (static HTML the pipeline renders into ./reports)
# at / — landing on history.html — and keeps the hello smoke-test page at /hello.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # reports/ has no index.html; history.html is the run listing / landing page.
    index history.html index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # hello page mounted at a separate path (not under the read-only dashboard
    # root, which can't host a nested mountpoint).
    location = /hello {
        return 301 /hello/;
    }
    location /hello/ {
        alias /usr/share/hello/;
        index index.html;
    }
}
