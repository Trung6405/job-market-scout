# Daily scout run: start the VM, SSH in and run one scout cycle, then
# deallocate the VM so it isn't billed for the ~23h/day it does nothing.
# Runs whatever code the last Deploy rsynced onto the VM.
name: Scheduled run

on:
  schedule:
    # 19:00 UTC (prior day) = 05:00 Melbourne time (AEST, UTC+10; no DST in winter).
    - cron: "0 19 * * *"
    # 01:00 UTC = 11:00 Melbourne time (AEST, UTC+10; no DST in winter).
    - cron: "0 1 * * *"
  workflow_dispatch:

# Needed for azure/login's OIDC federated-credential flow (no stored cloud secret).
permissions:
  id-token: write
  contents: read

jobs:
  run-job:
    runs-on: ubuntu-latest
    env:
      APP_DIR: /opt/job-market-scout
      VM_USER: ${{ vars.VM_USER }}
      VM_HOST: ${{ vars.VM_HOST }}
      RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
      # Fixed by infra/main.bicepparam (param vmName = 'scout-vm').
      VM_NAME: scout-vm
      # Fixed by infra/main.bicepparam (param dashboardStorageAccountName).
      DASHBOARD_STORAGE_ACCOUNT: trung6405scoutdash
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Start VM
        run: |
          set -euo pipefail
          # az vm start is idempotent: no-op if already running.
          az vm start --resource-group "$RESOURCE_GROUP" --name "$VM_NAME"

      - name: Set up SSH
        env:
          VM_SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VM_SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Wait for SSH
        run: |
          set -euo pipefail
          # az vm start returns once the VM is allocated, but sshd may need a
          # few more seconds after boot. Retry for up to ~2 minutes.
          for i in $(seq 1 24); do
            if ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
                -o ConnectTimeout=5 "$VM_USER@$VM_HOST" 'true' 2>/dev/null; then
              echo "SSH is up."
              exit 0
            fi
            echo "SSH not ready yet (attempt $i)..."
            sleep 5
          done
          echo "VM did not become reachable over SSH in time." >&2
          exit 1

      - name: Run scout cycle
        run: |
          set -euo pipefail
          # `docker compose run` starts the app's healthy-gated dependencies
          # (postgres, jobspy-mcp); the long-lived services also come back on
          # their own via restart: unless-stopped after the boot.
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "$VM_USER@$VM_HOST" \
            "cd $APP_DIR && docker compose -f docker-compose.yaml -f docker-compose.prod.yaml run --rm app"

      - name: Pull dashboard content from VM
        run: |
          set -euo pipefail
          mkdir -p dashboard-staging/hello
          rsync -az -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            "$VM_USER@$VM_HOST:$APP_DIR/reports/" dashboard-staging/
          rsync -az -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            "$VM_USER@$VM_HOST:$APP_DIR/hello/" dashboard-staging/hello/

      - name: Deploy dashboard to Storage static website
        run: |
          set -euo pipefail
          # --auth-mode login reuses the OIDC session from "Azure login"
          # above — no separate deploy-token secret needed. --overwrite so
          # stale files from a previous run's report folders don't linger
          # once superseded (history.html/profile.html always regenerate).
          az storage blob upload-batch \
            --account-name "$DASHBOARD_STORAGE_ACCOUNT" --auth-mode login \
            --destination '$web' --source dashboard-staging --overwrite

      - name: Deallocate VM
        # always(): stop billing even if the run, dashboard pull/deploy, or
        # SSH never came up. Deallocate (not stop) releases the compute so
        # it isn't charged.
        if: always()
        run: |
          set -euo pipefail
          az vm deallocate --resource-group "$RESOURCE_GROUP" --name "$VM_NAME"
