# Manual: provision/update the Azure VM from infra/main.bicep.
# Authenticates to Azure via OIDC federated credentials (no stored cloud secret).
name: Provision infra

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    env:
      RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        run: |
          set -euo pipefail
          az group create --name "$RESOURCE_GROUP" --location "$AZURE_LOCATION"
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --query "properties.outputs" -o json

      - name: Enable static website hosting on the dashboard storage account
        run: |
          set -euo pipefail
          # Static website hosting ($web container, index/error docs) is a
          # data-plane setting with no ARM resource property, so it's set
          # here instead of in main.bicep. Idempotent: re-running this is a
          # no-op if already enabled.
          ACCOUNT_NAME=$(az deployment group show \
            --resource-group "$RESOURCE_GROUP" --name main \
            --query "properties.outputs.dashboardStorageAccountNameOut.value" -o tsv)
          az storage blob service-properties update \
            --account-name "$ACCOUNT_NAME" --auth-mode login \
            --static-website --index-document history.html
