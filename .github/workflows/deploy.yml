# CI/CD: on push to main, run tests then deploy to the Azure VM.
# Code reaches the VM via rsync from the runner (no git access needed on the VM).
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# Needed for azure/login's OIDC federated-credential flow (no stored cloud secret).
permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    # The pipeline's persist step opens a real Postgres connection (scout/agent.py),
    # so the test suite needs a live DB — matching the compose stack the app runs
    # against everywhere else. Published on 5433 to line up with the default
    # DATABASE_URL (postgresql://scout:scout@localhost:5433/scout).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scout
          POSTGRES_PASSWORD: scout
          POSTGRES_DB: scout
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U scout"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://scout:scout@localhost:5433/scout
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Load DB schema
        # The persist path assumes tables already exist (schema is normally applied
        # inside track_listings, which the entrypoint test mocks). Apply it up front.
        run: PGPASSWORD=scout psql -h localhost -p 5433 -U scout -d scout -f scout/shared/schema.sql
      - name: Install deps and run pytest
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pytest

  deploy:
    needs: test
    # Only deploy from main. A manual dispatch on a feature branch then runs the
    # test job alone — useful for verifying CI without touching the VM.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      APP_DIR: /opt/job-market-scout
      VM_USER: ${{ vars.VM_USER }}
      VM_HOST: ${{ vars.VM_HOST }}
      RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
      # Fixed by infra/main.bicepparam (param vmName = 'scout-vm').
      VM_NAME: scout-vm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Start VM
        run: |
          set -euo pipefail
          # The scheduled-run workflow deallocates the VM after each cycle, so it
          # is normally powered off. Start it before rsync. az vm start is
          # idempotent: no-op if already running.
          az vm start --resource-group "$RESOURCE_GROUP" --name "$VM_NAME"

      - name: Set up SSH
        env:
          VM_SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VM_SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Wait for SSH
        run: |
          set -euo pipefail
          # az vm start returns once the VM is allocated, but sshd may need a
          # few more seconds after boot. Retry for up to ~2 minutes.
          for i in $(seq 1 24); do
            if ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
                -o ConnectTimeout=5 "$VM_USER@$VM_HOST" 'true' 2>/dev/null; then
              echo "SSH is up."
              exit 0
            fi
            echo "SSH not ready yet (attempt $i)..."
            sleep 5
          done
          echo "VM did not become reachable over SSH in time." >&2
          exit 1

      - name: Rsync repo to VM
        run: |
          set -euo pipefail
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            --exclude '.git' --exclude 'scout/.env' --exclude 'reports' \
            ./ "$VM_USER@$VM_HOST:$APP_DIR/"

      - name: Render .env on VM
        env:
          JOBSPY_MCP_URL: ${{ secrets.JOBSPY_MCP_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          SEARCH_ROLES: ${{ secrets.SEARCH_ROLES }}
          SEARCH_LOCATIONS: ${{ secrets.SEARCH_LOCATIONS }}
          RESULTS_WANTED: ${{ secrets.RESULTS_WANTED }}
          HOURS_OLD: ${{ secrets.HOURS_OLD }}
          PREFERRED_LOCATIONS: ${{ secrets.PREFERRED_LOCATIONS }}
          REMOTE_ONLY: ${{ secrets.REMOTE_ONLY }}
          MIN_SALARY: ${{ secrets.MIN_SALARY }}
          MIN_MATCH_SCORE: ${{ secrets.MIN_MATCH_SCORE }}
          DESCRIPTION_CHAR_LIMIT: ${{ secrets.DESCRIPTION_CHAR_LIMIT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BRIEFING_MAX_MATCHES: ${{ secrets.BRIEFING_MAX_MATCHES }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
        run: |
          set -euo pipefail
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new $VM_USER@$VM_HOST"
          $SSH "cat > $APP_DIR/scout/.env" <<__SCOUT_ENV_EOF__
          JOBSPY_MCP_URL=${JOBSPY_MCP_URL}
          DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
          DEEPSEEK_MODEL=${DEEPSEEK_MODEL}
          SEARCH_ROLES=${SEARCH_ROLES}
          SEARCH_LOCATIONS=${SEARCH_LOCATIONS}
          RESULTS_WANTED=${RESULTS_WANTED}
          HOURS_OLD=${HOURS_OLD}
          PREFERRED_LOCATIONS=${PREFERRED_LOCATIONS}
          REMOTE_ONLY=${REMOTE_ONLY}
          MIN_SALARY=${MIN_SALARY}
          MIN_MATCH_SCORE=${MIN_MATCH_SCORE}
          DESCRIPTION_CHAR_LIMIT=${DESCRIPTION_CHAR_LIMIT}
          DATABASE_URL=${DATABASE_URL}
          BRIEFING_MAX_MATCHES=${BRIEFING_MAX_MATCHES}
          GMAIL_ADDRESS=${GMAIL_ADDRESS}
          GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
          GMAIL_RECIPIENT=${GMAIL_RECIPIENT}
          __SCOUT_ENV_EOF__

      - name: Bring up containers
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "$VM_USER@$VM_HOST" \
            "cd $APP_DIR && docker compose -f docker-compose.yaml -f docker-compose.prod.yaml up -d --build"

      - name: Deallocate VM
        # always(): stop billing even if the deploy failed or SSH never came up.
        # Deallocate (not stop) releases the compute so it isn't charged. The
        # long-lived services come back on their own via restart: unless-stopped
        # when the next scheduled run boots the VM.
        if: always()
        run: |
          set -euo pipefail
          az vm deallocate --resource-group "$RESOURCE_GROUP" --name "$VM_NAME"
